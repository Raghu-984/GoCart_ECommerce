<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GoCart</title>
    <link rel="stylesheet" href="Home/Home.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>
<body>

    <!-- Mobile Menu Overlay -->
    <div id="mobileOverlay"></div>

    <nav>
        <div id="logo">
            <h1>GoCart</h1>
        </div>

        <div id="navigation_Option">
            <div><a href="" class="underLine">Home</a></div>
            <div><a href="" class="underLine">About</a></div>
        </div>

        <div id="search_box">
            <input type="text" id="searchbar" placeholder="Search products...">
            <div id="search_logo">
               <i class="bi bi-search"></i>
            </div>
        </div>

        <div id="nav_right">
            <div id="cart">
                <a href="../Cart/Cart.html">
                    <i class="bi bi-cart4"></i>
                    <span id="cartCount">0</span>
                </a>
            </div>
            <div id="userMenu">
                <i class="bi bi-person-circle" id="userIcon"></i>
                <div id="userDropdown">
                    <p id="userName"></p>
                    <hr/>
                    <button onclick="logout()"><i class="bi bi-box-arrow-right"></i> Logout</button>
                </div>
            </div>
        </div>

        <!-- Hamburger Button -->
        <button id="hamburgerBtn" aria-label="Toggle menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </nav>

    <!-- Mobile Slide-in Menu -->
    <div id="mobileMenu">
        <button id="closeMenu" aria-label="Close menu">
            <i class="bi bi-x-lg"></i>
        </button>
        <div id="mobileMenuContent">
            <a href="" onclick="closeMobileMenu()">🏠 Home</a>
            <a href="" onclick="closeMobileMenu()">ℹ️ About</a>
            <a href="../Cart/Cart.html">🛒 Cart <span id="mobileCartCount">0</span></a>
            <hr/>
            <div id="mobileUser">
                <p id="mobileUserName"></p>
            </div>
            <button id="mobileLogout" onclick="logout()"><i class="bi bi-box-arrow-right"></i> Logout</button>
        </div>
    </div>

    <div id="productContainer"></div>

    <script src="Home/Home.js"></script>
</body>
</html>
